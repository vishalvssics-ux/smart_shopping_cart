name: smart_cart
description: Smart Cart Shopping App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Image Picker
  image_picker: ^1.1.2

  # Smooth page indicator
  smooth_page_indicator: ^1.2.0+3

  # Google Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  cloud_firestore: ^6.1.3
  razorpay_flutter: ^1.3.5


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
